[package]
name = "re_test_viewport"
description = "A viewport used for tests"
authors.workspace = true
edition.workspace = true
homepage.workspace = true
include.workspace = true
license.workspace = true
publish = true
repository.workspace = true
rust-version.workspace = true
version.workspace = true

[lints]
workspace = true

[dependencies]
re_byte_size = { workspace = true, features = ["derive"] }
re_log_types.workspace = true
re_test_context.workspace = true
re_sdk_types.workspace = true
re_ui.workspace = true
re_viewer_context.workspace = true
re_viewport.workspace = true
re_viewport_blueprint.workspace = true

# External dependencies
ahash.workspace = true
egui.workspace = true

[dev-dependencies]
# These context-menu tests live here instead of in `re_context_menu` because
# dev-dependencies are included in the publishable-crate dependency DAG check.
# If `re_context_menu` depended on this crate for tests, it would create the
# cycle `re_context_menu -> re_test_viewport -> re_viewport -> re_context_menu`.
re_context_menu.workspace = true
re_chunk.workspace = true
re_entity_db.workspace = true
