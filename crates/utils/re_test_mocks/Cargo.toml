[package]
name = "re_test_mocks"
authors.workspace = true
description = "In-process server doubles (`MockOtlpCollector`, `MockPostHog`) used by tests that need to capture outbound OTel/PostHog traffic."
edition.workspace = true
homepage.workspace = true
include.workspace = true
license.workspace = true
publish = true
readme = "README.md"
repository.workspace = true
rust-version.workspace = true
version.workspace = true

[lints]
workspace = true


[dependencies]
axum.workspace = true
opentelemetry-proto = { workspace = true, features = ["gen-tonic", "trace"] }
parking_lot.workspace = true
serde_json.workspace = true
tokio.workspace = true
tokio-stream = { workspace = true, features = ["net"] }
tonic = { workspace = true, features = ["router", "transport", "gzip"] }


[dev-dependencies]
reqwest.workspace = true
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
