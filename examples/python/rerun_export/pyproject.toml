[project]
name = "rerun_export"
version = "0.1.0"
readme = "README.md"
requires-python = ">=3.10,<3.13"
dependencies = [
  "av",
  "datafusion",
  "lerobot==0.4.2",
  "numpy",
  "pandas",
  "pillow",
  "pyarrow",
  "rerun-sdk",
  "scipy",
  "tqdm",
]

[project.scripts]
rerun_export = "rerun_export.__main__:main"

[dependency-groups]
dev = ["mypy==1.19.1", "pandas-stubs==2.3.3.251201", "types-tqdm==4.67.0.20250809"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.rerun-example]
# Picked up by scripts/ci/isolated_examples.py and the `py-lint-isolated-examples` pixi task.
isolated = true

[tool.uv]
# Ignore LeRobot's pinned rerun-sdk so resolution picks the local source below.
# Scoped to this project — does not affect the root workspace.
override-dependencies = ["rerun-sdk"]

# Default `uv sync` uses the in-repo editable rerun-sdk (monorepo dev mode).
# After syncing, also run `uv pip install ../../../rerun_py/rerun_dev_fixup` to
# install the .pth shim that makes `import rerun` resolve to the editable source tree.
#
# Standalone users (e.g. sparse-checkout of just this example) run instead:
#   uv sync --no-sources --no-dev
# rerun-dev-fixup is intentionally absent: uv 0.7.x resolves all dependency groups
# unconditionally, so any path-only package here would block --no-sources resolution.
[tool.uv.sources]
rerun-sdk = { path = "../../../rerun_py", editable = true }

# Merged onto the shared base at `../_isolated/mypy.ini` by
# scripts/ci/isolated_examples.py — list the untyped third-party libs this
# example actually imports.
[[tool.mypy.overrides]]
module = ["lerobot.*", "av.*", "datafusion.*", "scipy.*"]
ignore_missing_imports = true
