[project]
name = "dataloader"
version = "0.1.0"
readme = "README.md"
requires-python = ">=3.10,<3.13"
dependencies = ["rerun-sdk[dataloader,dataplatform]", "huggingface-hub<1.0", "lerobot==0.4"]

[dependency-groups]
# rerun-dev-fixup installs the .pth shim that makes `import rerun` resolve to the
# editable `rerun_py/rerun_sdk/` tree — same trick the workspace .venv uses.
dev = ["mypy==1.19.1", "rerun-dev-fixup"]

[tool.rerun-example]
# Picked up by scripts/ci/isolated_examples.py and the `py-lint-isolated-examples` pixi task.
isolated = true

[tool.uv]
# The example is flat scripts, not a wheel — skip project build, just sync deps.
package = false
# Ignore LeRobot's pinned rerun-sdk so resolution picks the local source below.
# Scoped to this project — does not affect the root workspace.
override-dependencies = ["rerun-sdk[dataloader,dataplatform]"]

[tool.uv.sources]
rerun-sdk = { path = "../../../rerun_py", editable = true }
rerun-dev-fixup = { path = "../../../rerun_py/rerun_dev_fixup", editable = false }

# Merged onto the shared base at `../_isolated/mypy.ini` by
# scripts/ci/isolated_examples.py — list the untyped third-party libs this
# example actually imports.
[[tool.mypy.overrides]]
module = ["lerobot.*", "torch.*", "torchvision.*", "diffusers.*", "accelerate.*"]
ignore_missing_imports = true
